<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Nyiko</title>

<style>
body{
  font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg,#e0f7e9 0%,#f4f4f4 50%,#e8f5e9 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

.contact-card{
  background:white;
  padding:40px;
  border-radius:24px;
  width:90%;
  max-width:900px;
  box-shadow:0 12px 40px rgba(0,0,0,0.08);
}

.contact-container{
  display:flex;
  align-items:center;
  gap:40px;
}

.profile-img{
  width:260px;
  height:260px;
  border-radius:50%;
  object-fit:cover;
  border:6px solid #2ecc71;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

.contact-form{
  flex:1;
}

.contact-form h2{
  margin-top:0;
  color:#2d5e3f;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  margin-top:14px;
  padding:12px 20px;
  border:none;
  background:#2ecc71;
  color:white;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#27ae60;
}

.back{
  display:inline-block;
  margin-top:20px;
  text-decoration:none;
  color:#27ae60;
  font-weight:600;
}
</style>
</head>

<body>

<div class="contact-card">

<div class="contact-container">

<img src="me.jpeg" class="profile-img">

<div class="contact-form">

<h2>Contact Me</h2>

<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea rows="5" placeholder="Your Message"></textarea>
<button type="submit">Send Message</button>
</form>

<a class="back" href="index.html">← Back to links</a>

</div>

</div>

</div>

</body>
</html>
