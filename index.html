<title>Nyiko Mathebula — My Links</title>
<link href="https://fonts.cdnfonts.com/css/rustic-roadway-personal-use" rel="stylesheet">
<style>
*{
  box-sizing:border-box;
}
body{
  font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #e0f7e9 0%, #f4f4f4 50%, #e8f5e9 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:20px;
}
.card{
  background:white;
  padding:0 30px 40px 30px;
  border-radius:24px;
  width:100%;
  max-width:500px;
  text-align:center;
  box-shadow:0 12px 40px rgba(0,0,0,0.08);
  overflow:hidden;
}
.banner{
  height:200px;
  margin:0 -30px;
  background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800&q=80') center/cover no-repeat;
}
.profile-section{
  margin-top:-165px;
  margin-bottom:12px;
}
.profile-img{
  width:330px;
  height:330px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid white;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.name{
  font-family:'Rustic Roadway - Personal use', cursive;
  font-size:36px;
  font-weight:400;
  margin:8px 0 6px 0;
  color:#2d5e3f;
}
.tagline{
  font-family:'Rustic Roadway - Personal use', cursive;
  font-size:18px;
  color:#4a8a5e;
  margin:0 0 24px 0;
}
.btn{
  display:block;
  background:#2ecc71;
  color:white;
  text-decoration:none;
  padding:14px 16px;
  margin:10px 0;
  border-radius:12px;
  font-weight:600;
  font-size:15px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(46,204,113,0.35);
}
.btn.secondary{
  background:#27ae60;
}
.btn.secondary:hover{
  box-shadow:0 4px 12px rgba(39,174,96,0.35);
}
.socials{
  margin-top:24px;
  display:flex;
  justify-content:center;
  gap:16px;
}
.socials a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:42px;
  height:42px;
  border-radius:50%;
  background:#f0f0f0;
  text-decoration:none;
  transition: background 0.15s ease, transform 0.15s ease;
}
.socials a:hover{
  background:#2ecc71;
  transform:translateY(-2px);
}
.socials a:hover svg{
  fill:white;
}
.socials svg{
  width:20px;
  height:20px;
  fill:#333;
  transition: fill 0.15s ease;
}
</style>
</head>
<body>

<div class="card">

<div class="banner"></div>

<div class="profile-section">
  <img src="me.jpeg" class="profile-img" alt="Nyiko Mathebula">
</div>

<div class="name">Nyiko Mathebula</div>
<div class="tagline">Helping businesses grow with smart solutions</div>
